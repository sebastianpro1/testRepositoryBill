name: Generate SBOM on Pull Request
on:
  pull_request:
    types: [opened, synchronize, reopened] # Se ejecuta al abrir, actualizar o reabrir el PR
    branches:
      - main # O la rama base que utilices (ej. master, develop)
      - dev
jobs:
  sbom-generation-and-scan:
    runs-on: ubuntu-latest
    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Java (necesario si Trivy necesita resolver el build de Gradle)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Otorgar permisos de ejecución al script de Gradle (build necesario para que Trivy detecte dependencias resueltas)
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build project (resolve dependencies)
        run: ./gradlew build -x test

      # 4. Instalar Trivy
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # 5. Generar el SBOM directamente con Trivy (formato CycloneDX)
      - name: Generate CycloneDX SBOM with Trivy
        run: |
          mkdir -p build/reports/cyclonedx
          trivy fs . \
            --format cyclonedx \
            --output build/reports/cyclonedx/bom.json

      # 6. Validar sintaxis JSON del SBOM
      - name: Validate SBOM JSON syntax
        run: |
          cat ./build/reports/cyclonedx/bom.json | python3 -m json.tool > /dev/null
          echo "SBOM JSON is valid"

      # 7. Escanear el SBOM generado en busca de vulnerabilidades
      - name: Scan SBOM with Trivy
        run: |
          trivy sbom ./build/reports/cyclonedx/bom.json \
            --format table \
            --exit-code 1 \
            --severity HIGH,CRITICAL

      # 8. Archivar y documentar el SBOM generado como artefacto del PR
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bom-test
          path: "build/reports/cyclonedx/bom.json"
          if-no-files-found: error
          retention-days: 14